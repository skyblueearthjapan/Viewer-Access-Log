<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer-Access-Log — 全社アクセス効果測定</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <div class="logo">■ Viewer-Access-Log</div>
  <div class="search"><input id="globalq" placeholder="🔍 ファイル名 / ユーザー / メモ で検索（Enterでログ検索へ）…"></div>
  <div class="user">管理者 ▾</div>
</header>

<div class="shell">
  <nav id="nav">
    <a href="#/dashboard"  data-route="dashboard"><span class="ic">▤</span>ダッシュボード</a>
    <a href="#/search"     data-route="search"><span class="ic">🔍</span>ログ検索</a>
    <a href="#/users"      data-route="users"><span class="ic">👤</span>ユーザー別</a>
    <a href="#/depts"      data-route="depts"><span class="ic">📊</span>部署別利用率</a>
    <a href="#/alerts"     data-route="alerts"><span class="ic">🔔</span>アラート</a>
    <a href="#/incidents"  data-route="incidents"><span class="ic">⚠</span>検知インシデント</a>
    <a href="#/status"     data-route="status"><span class="ic">🖥</span>サーバー状態 / 健全性</a>
    <div class="nav-sep"></div>
    <a href="#/settings"   data-route="settings"><span class="ic">⚙</span>設定 <span class="badge-proto">P4</span></a>
  </nav>

  <main id="view"><!-- ハッシュルーターが各ビューを描画 --></main>
</div>

<!-- 行詳細スライドインパネル（ログ検索・インシデントで行クリック時に右からスライド） -->
<div id="dp-overlay" class="dp-overlay"></div>
<aside id="dp-panel" class="dp-panel" role="dialog" aria-label="詳細">
  <div class="dp-header">
    <span id="dp-title" class="dp-title">詳細</span>
    <button id="dp-close" class="dp-close" aria-label="閉じる">×</button>
  </div>
  <div id="dp-body" class="dp-body"></div>
</aside>

<!-- モーダル（設定画面の追加/編集フォーム） -->
<div id="modal-overlay" class="modal-overlay">
  <div id="modal-box" class="modal-box"></div>
</div>

<!-- トースト（楽観更新・書込モックの通知） -->
<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
